<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema de Tarefas</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="container">

<h1>Sistema de Tarefas</h1>

<input type="text" id="nova-tarefa" placeholder="Digite uma tarefa">
<button onclick="adicionarTarefa()">Adicionar</button>

<br><br>

<button onclick="carregarTarefas()">Carregar tarefas</button>

<ul id="lista-tarefas"></ul>
</div>

<script>

function carregarTarefas() {

fetch("http://127.0.0.1:5001/tarefas")

.then(response => response.json())

.then(response => {

const lista = document.getElementById("lista-tarefas")
lista.innerHTML = ""

const tarefas = response.dados || []

if (tarefas.length === 0) {

const li = document.createElement("li")

li.textContent = "Nenhuma tarefa cadastrada."

lista.appendChild(li)

return

}

tarefas.forEach(tarefa => {

const li = document.createElement("li")

const checkbox = document.createElement("input")

checkbox.type = "checkbox"

checkbox.checked = tarefa.concluida == 1

checkbox.onchange = () => atualizarTarefa(tarefa.id, checkbox.checked)

const texto = document.createElement("span")
texto.textContent = " " + tarefa.titulo

if (tarefa.concluida == 1) {

texto.style.textDecoration = "line-through"
texto.style.color = "gray"
}
const botaoEditar = document.createElement("button")

botaoEditar.textContent = "✏️"

botaoEditar.onclick = () => editarTarefa(tarefa.id, tarefa.titulo)
const botaoDeletar = document.createElement("button")
botaoDeletar.textContent = "🗑"

botaoDeletar.onclick = () => deletarTarefa(tarefa.id)
const dataCriacao = document.createElement("div")
dataCriacao.textContent = "Criada em: " + tarefa.data_criacao
dataCriacao.style.fontSize = "12px"
dataCriacao.style.color = "gray"
li.appendChild(checkbox)
li.appendChild(texto)
li.appendChild(botaoEditar)
li.appendChild(botaoDeletar)
li.appendChild(dataCriacao)

lista.appendChild(li)

})
})
}

function adicionarTarefa(){

const input = document.getElementById("nova-tarefa")
const titulo = input.value.trim()

if(titulo === ""){
alert("Digite uma tarefa!")
return
}

fetch("http://127.0.0.1:5001/tarefas",{

method: "POST",

headers:{
"Content-Type": "application/json"
},

body: JSON.stringify({
titulo: titulo
})
})

.then(response => response.json())
.then(data => {
if(data.status === "erro"){
alert(data.mensagem)
return
}
input.value = ""
carregarTarefas()
})
.catch(error => {
console.log(error)
alert("Erro ao conectar com a API")
})
}
function atualizarTarefa(id, concluida) {
fetch(`http://127.0.0.1:5001/tarefas/${id}`,{
method: "PUT",

headers:{
"Content-Type": "application/json"
},

body: JSON.stringify({
concluida: concluida
})
})
.then(() => carregarTarefas())
}
function deletarTarefa(id) {
fetch(`http://127.0.0.1:5001/tarefas/${id}`,{
method: "DELETE"
})
.then(() => carregarTarefas())
.catch(error => console.log(error))
}
function editarTarefa(id, tituloAtual){

const novoTitulo = prompt("Editar tarefa:", tituloAtual)
if(!novoTitulo) return
fetch(`http://127.0.0.1:5001/tarefas/${id}`,{
method: "PUT",
headers:{
"Content-Type": "application/json"
},
body: JSON.stringify({
titulo: novoTitulo
})
})
.then(() => carregarTarefas())

}

document.getElementById("nova-tarefa")
.addEventListener("keypress", function(event){

if(event.key === "Enter"){

adicionarTarefa()

}

})

</script>

</body>
</html>
